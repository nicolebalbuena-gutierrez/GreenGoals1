<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/greengoals-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/greengoals-icon.svg">
    <meta name="theme-color" content="#1a3a2f">
    <meta name="description" content="Social eco-challenges with friends.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GreenGoals">
    <script src="pwa-register.js" defer></script>
    <title>GreenGoals - Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="api-url.js"></script>
    <script src="auth-check.js"></script>
    <script src="nav-drawer.js"></script>
    <script src="page-loader.js"></script>
    <style>
        .container.dashboard-container { max-width: 1000px; width: 100%; }
        .tab-bar, .dashboard-header, .chat-layout { width: 100%; box-sizing: border-box; }
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-welcome { color: var(--mint); font-size: 0.9rem; }
        .logout-btn {
            padding: 10px 20px;
            background: rgba(224, 122, 95, 0.2);
            color: var(--cream);
            border: 1px solid rgba(224, 122, 95, 0.5);
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .logout-btn:hover {
            background: var(--coral);
            color: white;
        }
        
        .tab-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .tab-link {
            flex: 1;
            padding: 12px 24px;
            background: rgba(255,255,255,0.15);
            color: var(--cream);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
        }
        .tab-link:hover, .tab-link.active {
            background: var(--gold);
            color: var(--forest);
        }
        
        /* Chat mode tabs (General / DM / Team) */
        .chat-mode-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .chat-mode-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--sand);
            color: var(--text-dark);
            border: 2px solid transparent;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .chat-mode-btn:hover { background: var(--mint); color: var(--forest); }
        .chat-mode-btn.active {
            background: var(--forest);
            color: var(--cream);
            border-color: var(--forest);
        }
        .chat-mode-unread-badge {
            min-width: 22px;
            height: 22px;
            padding: 0 7px;
            border-radius: 999px;
            background: var(--coral);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            line-height: 22px;
            text-align: center;
        }
        
        /* Chat layout */
        .chat-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            min-height: 450px;
        }
        @media (min-width: 700px) {
            .chat-layout.dm-mode { grid-template-columns: 300px 1fr; }
        }
        
        .chat-sidebar {
            background: var(--cream);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px var(--shadow);
            max-height: 450px;
            overflow-y: auto;
        }
        .chat-sidebar.hidden { display: none !important; }
        
        .chat-main {
            background: var(--cream);
            border-radius: 20px;
            box-shadow: 0 10px 40px var(--shadow);
            display: flex;
            flex-direction: column;
            min-height: 450px;
        }
        
        .chat-header {
            padding: 20px 24px;
            border-bottom: 2px solid var(--sand);
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--forest);
        }
        .chat-header .subtitle { font-size: 0.85rem; color: var(--text-light); font-family: 'Outfit', sans-serif; margin-top: 4px; }
        .team-members-btn {
            padding: 6px 10px;
            background: rgba(255,255,255,0.8);
            border-radius: 999px;
            border: 1px solid rgba(26,58,47,0.3);
            font-size: 0.8rem;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .team-members-btn:hover {
            background: var(--mint);
        }
        .team-members-list {
            margin-top: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .team-member-pill {
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(255,255,255,0.9);
            font-size: 0.75rem;
            color: var(--forest);
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .chat-message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .chat-message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--forest), var(--forest-light));
            color: var(--cream);
            border-bottom-right-radius: 4px;
        }
        .chat-message.received {
            align-self: flex-start;
            background: var(--sand);
            color: var(--text-dark);
            border-bottom-left-radius: 4px;
        }
        .chat-message .sender { font-size: 0.8rem; font-weight: 600; margin-bottom: 4px; opacity: 0.9; }
        .chat-message .time { font-size: 0.7rem; opacity: 0.7; margin-top: 6px; }
        
        /* Post-style cards for General Chat */
        .chat-post {
            width: 100%;
            max-width: 100%;
            background: var(--cream);
            border: 2px solid var(--sand);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
        }
        .chat-post .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .post-delete-btn {
            padding: 6px 12px;
            background: rgba(224, 122, 95, 0.2);
            color: var(--coral);
            border: 1px solid var(--coral);
            border-radius: 8px;
            font-size: 0.8rem;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }
        .post-delete-btn:hover { background: var(--coral); color: white; }
        .chat-post .post-author { font-weight: 600; color: var(--forest); }
        .chat-post .post-time { font-size: 0.8rem; color: var(--text-light); }
        .chat-post .post-text { margin-bottom: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
        .chat-post .post-image { max-width: 100%; max-height: 400px; border-radius: 12px; display: block; cursor: pointer; }
        .post-actions { display: flex; align-items: center; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
        .post-like-btn, .post-reply-btn { background: none; border: none; font-family: 'Outfit', sans-serif; font-size: 0.85rem; color: var(--text-light); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; padding: 4px 0; transition: color 0.2s; }
        .post-like-btn:hover, .post-reply-btn:hover { color: var(--forest); }
        .post-like-btn.liked { color: var(--coral); }
        .post-reply-form { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--sand); display: flex; gap: 8px; align-items: flex-end; }
        .post-reply-form input { flex: 1; padding: 10px 14px; border: 2px solid var(--sand); border-radius: 10px; font-size: 0.9rem; }
        .post-reply-form input:focus { outline: none; border-color: var(--forest); }
        .post-reply-form button { padding: 10px 18px; border-radius: 10px; font-size: 0.9rem; cursor: pointer; }
        .chat-reply { margin-left: 24px; padding: 12px 16px; background: rgba(0,0,0,0.04); border-radius: 12px; margin-top: 8px; border-left: 3px solid var(--sage); }
        .chat-reply .reply-to { font-size: 0.75rem; color: var(--text-light); margin-bottom: 4px; }
        .chat-reply .reply-text { font-size: 0.9rem; line-height: 1.4; }
        .chat-reply .reply-meta { font-size: 0.75rem; color: var(--text-light); margin-top: 6px; }
        
        .chat-compose-post {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chat-compose-post textarea {
            width: 100%;
            min-height: 80px;
            padding: 14px 18px;
            border: 2px solid var(--sand);
            border-radius: 14px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            resize: vertical;
            transition: border-color 0.3s;
        }
        .chat-compose-post textarea:focus { outline: none; border-color: var(--forest); }
        .chat-compose-post textarea::placeholder { color: var(--text-light); opacity: 0.7; }
        .compose-actions { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .compose-image-preview {
            position: relative;
            display: inline-block;
        }
        .compose-image-preview img { max-width: 120px; max-height: 120px; border-radius: 10px; object-fit: cover; }
        .compose-image-preview .remove-img { position: absolute; top: -6px; right: -6px; width: 24px; height: 24px; border-radius: 50%; background: var(--coral); color: white; border: none; cursor: pointer; font-size: 14px; line-height: 1; display: flex; align-items: center; justify-content: center; }
        .compose-add-image { padding: 8px 16px; background: var(--sand); border: 2px dashed var(--sage); border-radius: 10px; color: var(--text-dark); font-family: 'Outfit', sans-serif; cursor: pointer; font-size: 0.9rem; }
        .compose-add-image:hover { background: var(--mint); border-color: var(--forest); }
        
        .chat-input-area {
            padding: 20px 24px;
            border-top: 2px solid var(--sand);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chat-input-area input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid var(--sand);
            border-radius: 14px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .chat-input-area input:focus {
            outline: none;
            border-color: var(--forest);
        }
        .chat-input-area input::placeholder { color: var(--text-light); opacity: 0.7; }
        .chat-send-btn {
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--forest), var(--forest-light));
            color: var(--cream);
            border: none;
            border-radius: 14px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .chat-send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26, 58, 47, 0.4);
        }
        .chat-send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .dm-user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 6px;
        }
        .dm-user-item:hover { background: var(--sand); }
        .dm-user-item.active { background: var(--mint); color: var(--forest); }
        .dm-user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--sage), var(--mint));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .dm-user-name { font-weight: 600; color: var(--text-dark); }
        .dm-user-username { font-size: 0.8rem; color: var(--text-light); }
        .dm-row-unread-badge {
            margin-left: auto;
            min-width: 22px;
            height: 22px;
            padding: 0 7px;
            border-radius: 999px;
            background: var(--coral);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            line-height: 22px;
            text-align: center;
            flex-shrink: 0;
        }
        .dm-sidebar-extras {
            display: none;
            margin-bottom: 16px;
        }
        .dm-sidebar-extras.visible { display: block; }
        .dm-search-wrap {
            position: relative;
        }
        .dm-search-input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--sand);
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            box-sizing: border-box;
            background: rgba(255,255,255,0.95);
        }
        .dm-search-input:focus {
            outline: none;
            border-color: var(--forest);
        }
        .dm-search-input::placeholder { color: var(--text-light); opacity: 0.85; }
        .dm-search-results {
            display: none;
            position: absolute;
            left: 0;
            right: 0;
            top: calc(100% + 4px);
            max-height: 240px;
            overflow-y: auto;
            background: var(--cream);
            border: 2px solid var(--sand);
            border-radius: 12px;
            box-shadow: 0 10px 32px var(--shadow);
            z-index: 20;
        }
        .dm-search-results.open { display: block; }
        .dm-search-result-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--sand);
        }
        .dm-search-result-row:last-child { border-bottom: none; }
        .dm-search-result-row:hover { background: var(--sand); }
        .dm-search-hint {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 8px;
            line-height: 1.35;
        }
        
        .chat-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            padding: 40px;
            text-align: center;
        }
        .chat-empty .icon { font-size: 4rem; margin-bottom: 16px; opacity: 0.5; }
        .chat-empty p { margin: 8px 0; }
        
        .select-conversation-msg {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            padding: 40px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="leaf leaf-1">🌿</div>
        <div class="leaf leaf-2">🍃</div>
        <div class="leaf leaf-3">🌱</div>
    </div>

    <div class="container dashboard-container">
        <div class="dashboard-header">
            <div class="logo">
                <span class="logo-icon">🌍</span>
                <h1>GreenGoals</h1>
            </div>
            <div class="header-right">
                <span class="user-welcome" id="userWelcome"></span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="tab-bar">
            <a href="home.html" class="tab-link">Home</a>
            <a href="challenges.html" class="tab-link">Challenges</a>
            <a href="leaderboard.html" class="tab-link">Leaderboard</a>
            <a href="teams.html" class="tab-link">Teams</a>
            <a href="chat.html" class="tab-link active">Chat</a>
            <a href="news.html" class="tab-link">News</a>
            <a href="profile.html" class="tab-link">Profile</a>
        </div>

        <div class="chat-mode-tabs">
            <button class="chat-mode-btn active" data-mode="general"> General Chat</button>
            <button class="chat-mode-btn" data-mode="dm"> DM</button>
            <button class="chat-mode-btn" data-mode="team"> Team Chat</button>
        </div>

        <div class="chat-layout" id="chatLayout">
            <aside class="chat-sidebar" id="chatSidebar">
                <h3 id="conversationListTitle" style="margin-bottom: 16px; font-family: 'Playfair Display', serif; color: var(--forest);">Start a conversation</h3>
                <div id="dmSidebarExtras" class="dm-sidebar-extras" aria-hidden="true">
                    <div class="dm-search-wrap">
                        <input type="search" id="dmUserSearch" class="dm-search-input" placeholder="Search users to start a chat…" maxlength="80" autocomplete="off" aria-label="Search users to message">
                        <div id="dmSearchResults" class="dm-search-results" role="listbox"></div>
                    </div>
                    <p class="dm-search-hint">Only people you’ve messaged appear below—search to start a new chat.</p>
                </div>
                <div id="dmUserList">
                    <p style="color: var(--text-light);">Loading…</p>
                </div>
            </aside>
            <main class="chat-main">
                <div class="chat-header" id="chatHeader">
                    <div style="display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap: wrap;">
                        <div>
                            <span id="chatTitle">General Chat</span>
                            <div class="subtitle" id="chatSubtitle">Chat with the whole GreenGoals community</div>
                        </div>
                        <div style="display:flex; align-items:center; gap:8px; flex-wrap: wrap;">
                            <a href="#" id="viewProfileBtn" style="display:none; padding:8px 14px; background:var(--sand); color:var(--forest); border-radius:10px; text-decoration:none; font-size:0.85rem; font-weight:600;">👤 View profile</a>
                            <button class="team-members-btn" id="teamMembersBtn" style="display:none;" onclick="toggleTeamMembers()">
                                👥 Team members
                            </button>
                        </div>
                    </div>
                    <div id="teamMembersList" class="team-members-list" style="display:none;"></div>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="chat-empty" id="chatEmpty">
                        <span class="icon">💬</span>
                        <p>No messages yet. Be the first to say hi!</p>
                    </div>
                </div>
                <div class="chat-input-area" id="chatInputArea">
                    <!-- General Chat: post composer -->
                    <div id="generalCompose" class="chat-compose-post" style="width: 100%; display: flex;">
                        <textarea id="postText" placeholder="Share an update, eco tip, or photo with the community... (like a tweet!)" maxlength="2000" autocomplete="off"></textarea>
                        <div class="compose-actions">
                            <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
                                <input type="file" id="postImageFile" accept="image/*" style="display: none;">
                                <button type="button" class="compose-add-image" onclick="document.getElementById('postImageFile').click()">📷 Add photo</button>
                                <span id="imagePreviewContainer"></span>
                            </div>
                            <button class="chat-send-btn" id="sendPostBtn" onclick="sendMessage()">Post</button>
                        </div>
                    </div>
                    <!-- DM: simple input -->
                    <div id="dmCompose" style="display: none; width: 100%; align-items: flex-end; gap: 12px;">
                        <input type="text" id="messageInput" placeholder="Type a message..." maxlength="2000" autocomplete="off" style="flex: 1; padding: 14px 18px; border: 2px solid var(--sand); border-radius: 14px;">
                        <button class="chat-send-btn" id="sendDmBtn" onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const API_URL = window.getGreenGoalsApiUrl();
        const user = getCurrentUser();
        const token = getToken();
        
        if (!user || !token) {
            window.location.href = 'index.html';
        }
        
        document.getElementById('userWelcome').textContent = `Hi, ${user.username}! 👋`;
        
        let currentMode = 'general';
        let selectedDmUserId = null;
        let hasTeamChat = false;
        let teamMeta = null;
        let userTeams = [];
        let currentTeamId = null;
        let pollInterval = null;
        const POLL_MS = 3000;
        let lastGeneralMessages = [];

        async function refreshUnreadUi() {
            try {
                const res = await fetch(`${API_URL}/chat/unread`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) return;
                const s = await res.json();
                applyChatModeButtonBadges(s);
                applySidebarRowBadges(s);
                updateMainTabBarChatBadgeFromSummary(s);
            } catch (e) {
                console.warn('Unread refresh:', e);
            }
        }

        async function markChatChannelRead(channel, extra = {}) {
            try {
                const body = { channel, ...extra };
                const res = await fetch(`${API_URL}/chat/read`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });
                if (!res.ok) console.warn('Mark read failed', await res.text());
            } catch (e) {
                console.warn('Mark read:', e);
            }
            await refreshUnreadUi();
        }

        function applyChatModeButtonBadges(s) {
            document.querySelectorAll('.chat-mode-btn').forEach(btn => {
                const mode = btn.dataset.mode;
                let n = 0;
                if (mode === 'general') n = s.general || 0;
                else if (mode === 'dm') n = Object.values(s.dm || {}).reduce((a, b) => a + b, 0);
                else if (mode === 'team') n = Object.values(s.team || {}).reduce((a, b) => a + b, 0);
                let badge = btn.querySelector('.chat-mode-unread-badge');
                if (n <= 0) {
                    if (badge) badge.remove();
                    return;
                }
                const label = n > 99 ? '99+' : String(n);
                if (!badge) {
                    badge = document.createElement('span');
                    badge.className = 'chat-mode-unread-badge';
                    badge.setAttribute('aria-label', `${n} unread`);
                    btn.appendChild(badge);
                }
                badge.textContent = label;
            });
        }

        function applySidebarRowBadges(s) {
            document.querySelectorAll('.dm-user-item[data-user-id]').forEach(row => {
                const id = row.getAttribute('data-user-id');
                const n = (s.dm && s.dm[String(id)]) || 0;
                let badge = row.querySelector('.dm-row-unread-badge');
                if (n <= 0) {
                    if (badge) badge.remove();
                    return;
                }
                const label = n > 99 ? '99+' : String(n);
                if (!badge) {
                    badge = document.createElement('span');
                    badge.className = 'dm-row-unread-badge';
                    badge.setAttribute('aria-label', `${n} unread messages`);
                    row.appendChild(badge);
                }
                badge.textContent = label;
            });
            document.querySelectorAll('.dm-user-item[data-team-id]').forEach(row => {
                const id = row.getAttribute('data-team-id');

        async function runDmUserSearch() {
            const input = document.getElementById('dmUserSearch');
            const box = document.getElementById('dmSearchResults');
            if (!input || !box) return;
            const q = (input.value || '').trim();
            if (!q) {
                box.innerHTML = '';
                box.classList.remove('open');
                return;
            }
            try {
                const res = await fetch(`${API_URL}/chat/users?q=${encodeURIComponent(q)}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const users = await res.json();
                if (!Array.isArray(users) || !users.length) {
                    box.innerHTML = '<div class="dm-search-result-row" style="cursor:default;color:var(--text-light);">No users found</div>';
                    box.classList.add('open');
                    return;
                }
                box.innerHTML = users.map(u => {
                    const displayName = u.firstName && u.lastName ? `${u.firstName} ${u.lastName}` : u.username;
                    const safeName = (displayName || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
                    const safeUsername = (u.username || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
                    const initial = (u.firstName || u.username || '?')[0].toUpperCase();
                    return `
                        <div class="dm-search-result-row" role="option" onclick="openDmFromSearch(${u.id}, '${safeName}', '${safeUsername}')">
                            <div class="dm-user-avatar">${initial}</div>
                            <div>
                                <div class="dm-user-name">${escapeHtml(displayName)}</div>
                                <div class="dm-user-username">@${escapeHtml(u.username || '')}</div>
                            </div>
                        </div>`;
                }).join('');
                box.classList.add('open');
            } catch (e) {
                box.innerHTML = '<div class="dm-search-result-row" style="cursor:default;color:var(--coral);">Could not search</div>';
                box.classList.add('open');
            }
        }

        function renderMessages(messages, isDm) {
            const container = document.getElementById('chatMessages');
            
            if (!messages || messages.length === 0) {
                container.innerHTML = `
                    <div class="chat-empty">
                        <span class="icon">💬</span>
                        <p>No messages yet. ${isDm ? 'Say hi!' : 'Be the first to post!'}</p>
                    </div>
                `;
                return;
            }
            
            if (isDm) {
                container.innerHTML = messages.map(m => {
                    const isSent = parseInt(m.senderId) === parseInt(user.id);
                    const timeStr = m.createdAt
                        ? new Date(m.createdAt).toLocaleString([], { dateStyle: 'short', timeStyle: 'short' })
                        : '';
                    return `
                        <div class="chat-message ${isSent ? 'sent' : 'received'}">
                            <div class="text">${escapeHtml(m.text)}</div>
                            <div class="time">${timeStr}</div>
                        </div>
                    `;
                }).join('');
            } else {
                // General chat: roots (no parentMessageId) + replies grouped by parent
                const hadReplyFocus = openReplyPostId && document.activeElement && document.activeElement.id === 'replyInputForOpen';
                if (openReplyPostId) {
                    const inp = document.getElementById('replyInputForOpen');
                    if (inp) replyDraft = inp.value;
                }
                const roots = messages.filter(m => !m.parentMessageId).sort((a, b) => new Date(a.createdAt || 0) - new Date(b.createdAt || 0));
                if (roots.length === 0) {
                    container.innerHTML = `
                        <div class="chat-empty">
                            <span class="icon">💬</span>
                            <p>No messages yet. Be the first to post!</p>
                        </div>
                    `;
                    container.scrollTop = container.scrollHeight;
                    return;
                }
                const repliesByParent = {};
                messages.filter(m => m.parentMessageId).forEach(r => {
                    const pid = r.parentMessageId;
                    if (!repliesByParent[pid]) repliesByParent[pid] = [];
                    repliesByParent[pid].push(r);
                });
                Object.keys(repliesByParent).forEach(pid => {
                    repliesByParent[pid].sort((a, b) => new Date(a.createdAt || 0) - new Date(b.createdAt || 0));
                });
                const safeId = (id) => String(id).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
                container.innerHTML = roots.map(root => {
                    const timeStr = root.createdAt ? new Date(root.createdAt).toLocaleString() : '';
                    const textHtml = root.text ? `<div class="post-text">${escapeHtml(root.text)}</div>` : '';
                    const mime = root.imageMimeType || 'image/jpeg';
                    const imgHtml = root.imageBase64 ? `<img class="post-image" src="data:${mime};base64,${root.imageBase64}" alt="Post" onclick="window.open(this.src)">` : '';
                    const isOwn = parseInt(root.senderId) === parseInt(user.id);
                    const deleteBtn = isOwn ? `<button type="button" class="post-delete-btn" onclick="deleteOwnPost('${safeId(root.id)}')" title="Delete your post"> Delete</button>` : '';
                    const likedBy = root.likedBy || [];
                    const likeCount = likedBy.length;
                    const isLiked = likedBy.some(uid => parseInt(uid) === parseInt(user.id));
                    const likeClass = isLiked ? 'post-like-btn liked' : 'post-like-btn';
                    const likeLabel = isLiked ? '❤️' : '🤍';
                    const replies = (repliesByParent[root.id] || []);
                    const replyRows = replies.map(r => {
                        const rTime = r.createdAt ? new Date(r.createdAt).toLocaleString() : '';
                        return `<div class="chat-reply"><div class="reply-to">Replying to @${escapeHtml(root.senderUsername || 'unknown')}</div><div class="reply-text">${escapeHtml(r.text || '')}</div><div class="reply-meta">@${escapeHtml(r.senderUsername || 'unknown')} · ${rTime}</div></div>`;
                    }).join('');
                    const showReplyForm = String(openReplyPostId) === String(root.id);
                    const draftVal = showReplyForm ? escapeHtml(replyDraft) : '';
                    const replyFormHtml = showReplyForm ? `<div class="post-reply-form"><input type="text" id="replyInputForOpen" placeholder="Write a reply..." maxlength="2000" autocomplete="off" value="${draftVal}" oninput="replyDraft=this.value"><button type="button" class="chat-send-btn" style="padding: 10px 18px;" onclick="submitReply('${safeId(root.id)}')">Send</button><button type="button" onclick="cancelReply()" style="background: var(--sand); color: var(--text-dark); border: none;">Cancel</button></div>` : '';
                    return `
                        <div class="chat-post" data-root-id="${escapeHtml(root.id)}">
                            <div class="post-header">
                                <span class="post-author">@${escapeHtml(root.senderUsername || 'unknown')}</span>
                                <div style="display: flex; align-items: center; gap: 12px;">
                                    <span class="post-time">${timeStr}</span>
                                    ${deleteBtn}
                                </div>
                            </div>
                            ${textHtml}
                            ${imgHtml}
                            <div class="post-actions">
                                <button type="button" class="${likeClass}" onclick="likePost('${safeId(root.id)}')" title="Like">${likeLabel} ${likeCount}</button>
                                <button type="button" class="post-reply-btn" onclick="openReplyForm('${safeId(root.id)}')" title="Reply">💬 Reply</button>
                            </div>
                            ${replyRows}
                            ${replyFormHtml}
                        </div>
                    `;
                }).join('');
                if (hadReplyFocus) {
                    const inp = document.getElementById('replyInputForOpen');
                    if (inp) inp.focus();
                }
            }
            container.scrollTop = container.scrollHeight;
        }
        
        async function deleteOwnPost(messageId) {
            if (!confirm('Delete this post? This cannot be undone.')) return;
            try {
                const res = await fetch(`${API_URL}/chat/messages/${messageId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (res.ok) {
                    loadGeneralMessages();
                } else {
                    alert(data.error || 'Failed to delete');
                }
            } catch (e) {
                alert('Could not delete post');
            }
        }
        
        async function likePost(messageId) {
            try {
                const res = await fetch(`${API_URL}/chat/messages/${messageId}/like`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (res.ok) {
                    loadGeneralMessages();
                } else {
                    alert(data.error || 'Could not update like');
                }
            } catch (e) {
                alert('Could not update like');
            }
        }
        
        function openReplyForm(postId) {
            openReplyPostId = postId;
            replyDraft = '';
            renderMessages(lastGeneralMessages, false);
            const input = document.getElementById('replyInputForOpen');
            if (input) input.focus();
        }
        
        function cancelReply() {
            openReplyPostId = null;
            replyDraft = '';
            renderMessages(lastGeneralMessages, false);
        }
        
        async function submitReply(postId) {
            const input = document.getElementById('replyInputForOpen');
            const text = ((input && input.value) ? input.value : replyDraft).trim();
            if (!text) return;
            try {
                const res = await fetch(`${API_URL}/chat/general`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ text: text, parentMessageId: postId })
                });
                const data = await res.json();
                if (res.ok) {
                    openReplyPostId = null;
                    replyDraft = '';
                    loadGeneralMessages();
                } else {
                    alert(data.error || 'Failed to send reply');
                }
            } catch (e) {
                alert('Could not send reply');
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        let selectedImageBase64 = null;
        let selectedImageMimeType = 'image/jpeg';
        
        document.getElementById('postImageFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) { alert('Image must be under 2MB'); e.target.value = ''; return; }
            selectedImageMimeType = file.type || 'image/jpeg';
            const reader = new FileReader();
            reader.onload = function(ev) {
                const dataUrl = ev.target.result;
                selectedImageBase64 = dataUrl.split(',')[1] || dataUrl;
                document.getElementById('imagePreviewContainer').innerHTML = `
                    <div class="compose-image-preview">
                        <img src="${dataUrl}" alt="Preview">
                        <button type="button" class="remove-img" onclick="clearPostImage()" title="Remove">×</button>
                    </div>
                `;
            };
            reader.readAsDataURL(file);
            e.target.value = '';
        });
        
        function clearPostImage() {
            selectedImageBase64 = null;
            selectedImageMimeType = 'image/jpeg';
            document.getElementById('imagePreviewContainer').innerHTML = '';
        }
        
        async function sendMessage() {
            let text, body;
            const sendBtn = currentMode === 'general' ? document.getElementById('sendPostBtn') : document.getElementById('sendDmBtn');
            sendBtn.disabled = true;
            
            if (currentMode === 'general') {
                text = (document.getElementById('postText').value || '').trim();
                if (!text && !selectedImageBase64) {
                    alert('Add some text or a photo to post!');
                    sendBtn.disabled = false;
                    return;
                }
                body = { text: text || '', imageBase64: selectedImageBase64 || undefined, imageMimeType: selectedImageMimeType || 'image/jpeg' };
            } else if (currentMode === 'dm') {
                if (!selectedDmUserId) { sendBtn.disabled = false; return; }
                text = (document.getElementById('messageInput').value || '').trim();
                if (!text) { sendBtn.disabled = false; return; }
                body = { text };
            } else if (currentMode === 'team') {
                text = (document.getElementById('messageInput').value || '').trim();
                if (!text) { sendBtn.disabled = false; return; }
                body = currentTeamId
                    ? { text, teamId: currentTeamId }
                    : { text };
            }
            
            try {
                let url;
                if (currentMode === 'general') {
                    url = `${API_URL}/chat/general`;
                } else if (currentMode === 'dm') {
                    url = `${API_URL}/chat/dm/${selectedDmUserId}`;
                } else {
                    url = `${API_URL}/chat/team`;
                }
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });
                let data;
                try { data = await res.json(); } catch (_) { data = {}; }
                if (res.ok) {
                    if (currentMode === 'general') {
                        document.getElementById('postText').value = '';
                        clearPostImage();
                        loadGeneralMessages();
                    } else if (currentMode === 'dm') {
                        document.getElementById('messageInput').value = '';
                        loadDmMessages();
                        loadDmConversations();
                    } else {
                        document.getElementById('messageInput').value = '';
                        loadTeamMessages();
                    }
                } else {
                    alert('Failed to send: ' + (data.error || res.statusText || 'Unknown error'));
                }
            } catch (e) {
                console.error('Send message error:', e);
                alert('Could not send. Check your connection.');
            }
            sendBtn.disabled = false;
        }
        
        document.getElementById('messageInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });
        document.getElementById('postText').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });
        document.getElementById('chatMessages').addEventListener('keydown', (e) => {
            if (e.target.id === 'replyInputForOpen' && e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (openReplyPostId) submitReply(openReplyPostId);
            }
        });
        
        function poll() {
            if (currentMode === 'general') loadGeneralMessages();
            else if (currentMode === 'dm') {
                if (selectedDmUserId) loadDmMessages();
                else loadDmConversations();
            } else if (currentMode === 'team' && currentTeamId) loadTeamMessages();
            else void refreshUnreadUi();
        }
        
        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(poll, POLL_MS);
        }
        
        function stopPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = null;
        }
        
        async function bootChatPage() {
            showGreenGoalsPageLoader('Loading chat…');
            try {
                document.getElementById('chatSidebar').classList.add('hidden');
                await loadGeneralMessages();
                startPolling();
            } finally {
                hideGreenGoalsPageLoader();
            }
        }
        bootChatPage();
        
        window.addEventListener('visibilitychange', () => {
            if (document.hidden) stopPolling();
            else startPolling();
        });
    </script>
</body>
</html>
